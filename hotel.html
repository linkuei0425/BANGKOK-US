                        { name: "Somerset Rama 9 Bangkok", feature: "Premium serviced apartments. Rooms feature full kitchens and laundry equipment, perfect for long stays or families.", address: "22 Ratchadaphisek Rd / 5 min walk from MRT Phra Ram 9.", url: "https://www.trip.com/t/uXMs9ba5nT2&locale=en_xx&curr=USD" },
                        { name: "The Emerald Hotel", feature: "Classic large hotel in Huai Khwang. Slightly dated but famous for its lavish buffet and spacious rooms.", address: "99 Ratchadaphisek Rd / 5 min walk from MRT Huai Khwang.", url: "https://www.trip.com/t/JPja0Ib5nT2&locale=en_xx&curr=USD" }
                    ],
                    "Budget Hotels": [
                        { name: "Ibis Styles Bangkok Ratchada", feature: "Lively and colorful design. Flawless location right next to the MRT station and bustling night market area.", address: "212 Ratchadaphisek Rd / 1 min walk from MRT Huai Khwang.", url: "https://www.trip.com/t/zo5Ou2e5nT2&locale=en_xx&curr=USD" },
                        { name: "Amanta Hotel & Residence Ratchada", feature: "Serviced apartment hidden in an alley behind the mall. Features a large tropical green atrium and pool, like an urban oasis.", address: "77-79 Ratchadaphisek Rd / 5 min walk from MRT Thailand Cultural Centre.", url: "https://www.trip.com/t/FVfjHWe5nT2&locale=en_xx&curr=USD" },
                        { name: "Prom Ratchada Hotel", feature: "Simple, clean, and affordable. Located right around the Ratchada Train Night Market (now The One Ratchada).", address: "558 Ratchadaphisek Soi 7 / 8 min walk from MRT Thailand Cultural Centre.", url: "https://www.trip.com/t/b6d135f5nT2&locale=en_xx&curr=USD" },
                        { name: "Ratchada Boutique Hotel", feature: "A dark-toned, modern budget hotel. Rooms are small but exquisite, suitable for young travelers and couples.", address: "121 Ratchadaphisek Soi 17 / 5 min walk from MRT Sutthisan.", url: "https://www.trip.com/t/pGWspqf5nT2&locale=en_xx&curr=USD" },
                        { name: "Mybed Ratchada", feature: "Modern economy hotel selling on minimalism and ultra-low prices. The MRT station is just across the street.", address: "8/71 Ratchadaphisek Rd / 1 min walk from MRT Lat Phrao.", url: "https://www.trip.com/t/5GU9Fbg5nT2&locale=en_xx&curr=USD" }
                    ],
                    "Hostels": [
                        { name: "Siamaze Hostel", feature: "Offers rare hostel double and family rooms. Hosts free Thai cooking classes on weekends.", address: "90 Ratchadaphisek Soi 17 / 10 min walk from MRT Sutthisan.", url: "https://www.trip.com/t/m65siNh5nT2&locale=en_xx&curr=USD" },
                        { name: "Sova Hotel & Hostel", feature: "Raw concrete industrial style. Beds are spacious, comfortable, and extremely clean. The lobby feels like a highly textured hipster cafe.", address: "309/20 Ratchadaphisek Rd / 5 min walk from MRT Huai Khwang.", url: "https://www.trip.com/t/EBiNR5i5nT2&locale=en_xx&curr=USD" }
                    ]

            },
            "chatuchak": {
                name: "Chatuchak & Ari",
                categories: {
                    "5-Star Hotels": [
                        { name: "Centara Grand at Central Plaza Ladprao", feature: "Integrated with the large Central Ladprao mall, making shopping and dining extremely convenient. Rooms overlook the vast Chatuchak Park.", address: "1695 Phahonyothin Rd / 2 min walk from BTS Ha Yaek Lat Phrao.", url: "https://www.trip.com/t/OvA2ZUk5nT2&locale=en_xx&curr=USD" },
                        { name: "The Quarter Ari by UHG", feature: "A landmark 4-star hotel in Ari. The rooftop infinity pool and gym offer excellent views. Stylish and modern.", address: "428 Phahonyothin Rd / 8 min walk from BTS Ari.", url: "https://www.trip.com/t/eBRMo7l5nT2&locale=en_xx&curr=USD" },
                        { name: "Best Western Chatuchak", feature: "A fresh chain hotel near Chatuchak Market. Facilities are very clean and modern. Top choice for wholesale shoppers or weekend market visitors.", address: "104 Phahonyothin Rd / 2 min walk from MRT Kamphaeng Phet.", url: "https://www.trip.com/t/UFRdwZl5nT2&locale=en_xx&curr=USD" },
                        { name: "Josh Hotel", feature: "A must-visit retro boutique hotel for Instagrammers! Mint green pool and American retro decor everywhere.", address: "19/2 Ari Soi 4 (Nua) / 8 min walk from BTS Ari.", url: "https://www.trip.com/t/i7YYp6m5nT2&locale=en_xx&curr=USD" },
                        { name: "Vibe Hotel Bangkok", feature: "Vibrant and youthful brand. Colorful and design-oriented. Very close to Chatuchak and the BTS station.", address: "59 Phahonyothin Rd / 5 min walk from BTS Sena Nikhom.", url: "https://www.trip.com/t/JQAfnhm5nT2&locale=en_xx&curr=USD" }
                    ],
                    "Budget Hotels": [
                        { name: "Suda Palace Hotel", feature: "Leans towards an old-school Thai hotel, but perfectly located next to the Saphan Khwai check-in hotspot, and prices are extremely cheap.", address: "245 Pradiphat Rd / 5 min walk from BTS Saphan Khwai.", url: "https://www.trip.com/t/62ni8Un5nT2&locale=en_xx&curr=USD" },

                        { name: "Craftsman Bangkok", feature: "Despite a budget-friendly price, it features high-quality decor and a stunning pool. The Baby Bar downstairs is a popular photo spot.", address: "34-36 Phahonyothin Soi 11 / Tuk-tuk or taxi recommended.", url: "https://www.trip.com/t/I41bOZp5nT2&locale=en_xx&curr=USD" }
                    ],
                    "Hostels": [
                        { name: "Bed to Bangkok", feature: "Walking distance to Chatuchak Market! Pure white minimalist design with a comfortable public reading and workspace.", address: "1021/1 Phahonyothin Rd / 5 min walk from BTS Mo Chit.", url: "https://www.trip.com/t/ch9YKfq5nT2&locale=en_xx&curr=USD" },
                        { name: "Udee Bangkok Hostel", feature: "Cozy hostel converted from an old house. Serves simple but delicious homemade Thai breakfast. Feels like staying at a local friend's home.", address: "49 Pradiphat Soi 19 / 12 min walk from BTS Saphan Khwai.", url: "https://www.trip.com/t/d8cPKCr5nT2&locale=en_xx&curr=USD" }
                    ]

            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        const categoriesList = ["5-Star Hotels", "Budget Hotels", "Hostels"];

        // 1. Initialize District Buttons
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-3 rounded-lg font-bold text-sm transition-all duration-200 border area-btn-inactive`;
                btn.innerText = hotelData[key].name;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. Select District
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            // Update district button appearance
            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');

            // Show category buttons
            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. Render Category Buttons
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            
            categoriesList.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // Auto-select the first category (5-Star Hotels)
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(categoriesList[0], firstCatBtn);
            }
        }

        // 4. Select Category & Render Hotel List
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            // Update category button appearance
            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');

            renderHotels();
        }

        // 5. Render Hotel Data to View
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex items-center mb-6 border-b pb-4 border-slate-200">
                    <h2 class="text-2xl font-bold text-slate-800 mr-3">📍 ${districtData.name}</h2>
                    <span class="px-3 py-1 bg-blue-100 text-blue-800 text-sm font-bold rounded-full">${currentCategoryName}</span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center">No recommendations available for this category currently.</p>`;
            } else {
                htmlContent += `<div class="space-y-4">`;
                
                hotels.forEach((hotel, index) => {
                    // Check if URL is provided to determine the styling of the [View Hotel Details] link
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm cursor-pointer ml-0 sm:ml-3">
                               <svg class="mr-1 h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                               View Hotel Details
                           </a>`
                        : `<span class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-slate-200 text-slate-500 ml-0 sm:ml-3">
                               View Hotel Details
                           </span>`;

                    htmlContent += `
                        <div class="bg-slate-50 border border-slate-200 p-5 rounded-lg hover:shadow-md transition-shadow duration-200 group">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-start mb-4">
                                <h4 class="text-lg font-bold text-slate-800 flex items-center">
                                    <span class="text-blue-500 font-mono text-base mr-2">${index + 1}.</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-6 space-y-3">
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-blue-50 px-1.5 py-0.5 rounded mr-1">Feature</span> ${hotel.feature}
                                </p>
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-slate-200 px-1.5 py-0.5 rounded mr-1">Address/Transport</span> ${hotel.address}
                                </p>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // Initialize when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            
            // Expand the first district (Siam) by default
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('siam', firstDistrictBtn);
            }
        });
    </script>
</body>
